version: '3.8'

services:
  # PostgreSQL - Primary relational database
  postgres:
    image: postgis/postgis:15-3.4
    container_name: metis-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-metis}
      POSTGRES_USER: ${POSTGRES_USER:-metis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metis_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metis} -d ${POSTGRES_DB:-metis}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metis-network

  # Redis - Cache and task queue
  redis:
    image: redis:7-alpine
    container_name: metis-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metis-network

  # Neo4j - Graph database
  neo4j:
    image: neo4j:5-community
    container_name: metis-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j_password}
      NEO4J_PLUGINS: '["apoc", "gds"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metis-network

  # OpenSearch - Full-text search
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: metis-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - metis-network

  # MinIO - Object storage for evidence
  minio:
    image: minio/minio:latest
    container_name: metis-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metis-network

  # Create MinIO bucket on startup
  minio-init:
    image: minio/mc:latest
    container_name: metis-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc config host add myminio http://minio:9000 ${S3_ACCESS_KEY:-minioadmin} ${S3_SECRET_KEY:-minioadmin};
      /usr/bin/mc mb myminio/${S3_BUCKET_NAME:-metis-evidence} || true;
      /usr/bin/mc policy set public myminio/${S3_BUCKET_NAME:-metis-evidence};
      exit 0;
      "
    networks:
      - metis-network

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  opensearch_data:
  minio_data:

networks:
  metis-network:
    driver: bridge
