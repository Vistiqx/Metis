apiVersion: apps/v1
kind: Deployment
metadata:
  name: metis-api
  namespace: metis
spec:
  replicas: 3
  selector:
    matchLabels:
      app: metis-api
  template:
    metadata:
      labels:
        app: metis-api
    spec:
      containers:
        - name: api
          image: metis/api:latest
          ports:
            - containerPort: 8000
          env:
            - name: POSTGRES_HOST
              value: postgres.metis.svc.cluster.local
            - name: REDIS_HOST
              value: redis.metis.svc.cluster.local
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: metis-api
  namespace: metis
spec:
  selector:
    app: metis-api
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
